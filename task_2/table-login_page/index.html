<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
.table table {
  border-collapse: collapse;
  border: 0.5px solid #222222;
  width: 500px;
}

.table th {
    background: #59afff;
    border: 0.5px solid #222222;
    padding: 2%;
}

.table td {
    border: 0.5px solid #222222;
    text-align: left;
    padding: 3px;
}

.login-page fieldset {
    width: 280px;
    margin-top: 20px;
    padding: 10px 20px 15px;
    border: 1px solid #aaa;
    border-radius: 4px;
}

.login-page legend {
    padding: 0 5px;
    font-family: sans-serif;
    font-size: 14px;
}

.login-page table {
    border: none;
    width: auto;
    border-collapse: separate;
    border-spacing: 0 6px;
}

.login-page td {
    border: none;
    padding: 2px 6px;
    vertical-align: middle;
    font-family: sans-serif;
    font-size: 14px;
    white-space: nowrap;
}

.login-page input[type="text"],
.login-page input[type="password"] {
    border: 1px solid #5b9bd5;
    outline: none;
    padding: 3px 5px;
    font-size: 13px;
    width: 160px;
    box-sizing: border-box;
    border-radius: 4px;
}

.login-page input[type="text"]:focus,
.login-page input[type="password"]:focus {
    border-color: #3a80c7;
    box-shadow: 0 0 3px rgba(90,155,213,0.6);
}

.login-page button {
    margin-top: 4px;
    padding: 3px 14px;
    font-size: 13px;
    cursor: pointer;
    background: #f0f0f0;
    border: 1px solid #aaa;
    border-radius: 15px;
}

.login-page button:hover {
    background: #e0e0e0;
}

</style>
<body>
    <section class="table">
        <table>
        <tr>
            <th rowspan="2">Nama</th>
            <th colspan="3">Nilai</th>
            <tr>
                <th>Kimia</th>
                <th>Fisika</th>
                <th>Biologi</th>
            </tr>
        </tr>
        <tr>
            <td>Robby</td>
            <td>76</td>
            <td>80</td>
            <td>81</td>
        </tr>
        <tr>
            <td>Rendi</td>
            <td>84</td>
            <td>70</td>
            <td>75</td>
        </tr>
        <tr>
            <td>Alfian</td>
            <td>96</td>
            <td>70</td>
            <td>70</td>
        </tr>
    </table>
    </section>

    <section class="login-page">
        <fieldset>
            <legend>Login</legend>
            <table>
                <tr>
                    <td>Username:</td>
                    <td><input type="text" name="username" placeholder="your username"></td>
                </tr>
                <tr>
                    <td>Password:</td>
                    <td><input type="password" name="password" placeholder="your password"></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <input type="checkbox" name="remember" id="remember">
                        <label for="remember">Remember me</label>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <button type="submit">Login</button>
                    </td>
                </tr>
            </table>
        </fieldset>
    </section>
</body>
</html>
